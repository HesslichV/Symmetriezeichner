         
<h1>Live Symmetrie-Zeichner</h1>

<div id="all-controls">
    <div class="control-group">
        <button id="mode-mirror">Achsensymmetrie</button>
        <button id="mode-rotate">Punktsymmetrie</button>
    </div>
    <div class="control-group">
        <button class="color-btn active" style="background-color: #000000;" data-color="#000000"></button>
        <button class="color-btn" style="background-color: #e74c3c;" data-color="#e74c3c"></button>
        <button class="color-btn" style="background-color: #3498db;" data-color="#3498db"></button>
        <button class="color-btn" style="background-color: #2ecc71;" data-color="#2ecc71"></button>
        <button class="color-btn" style="background-color: #f1c40f;" data-color="#f1c40f"></button>
    </div>
    <div class="control-group">
        <label for="stroke-width-slider">Dicke:</label>
        <input type="range" id="stroke-width-slider" min="1" max="20" value="3">
    </div>
    <div class="control-group">
        <button id="undo">Zurück</button>
        <button id="clear">Löschen</button>
    </div>
</div>

<div id="canvas-container">
    <canvas id="board"></canvas>
</div>

<script>
    const canvas = document.getElementById('board');
    const ctx = canvas.getContext('2d');
    const btnMirror = document.getElementById('mode-mirror');
    const btnRotate = document.getElementById('mode-rotate');
    const btnClear = document.getElementById('clear');
    const btnUndo = document.getElementById('undo');
    const colorButtons = document.querySelectorAll('.color-btn');
    const strokeSlider = document.getElementById('stroke-width-slider');

    let mode = null;
    let drawing = false;
    let prev = null;
    let history = [];
    let currentStroke = { color: '#000000', width: 3 };

    function setupCanvas() {
        const ratio = Math.max(1, window.devicePixelRatio || 1);
        const container = document.getElementById('canvas-container');
        const width = container.clientWidth;
        const height = width * 0.75;

        canvas.width = width * ratio;
        canvas.height = height * ratio;
        canvas.style.width = `${width}px`;
        canvas.style.height = `${height}px`;

        ctx.scale(ratio, ratio);
        redrawFromHistory(); // Stellt sicher, dass der Inhalt nach Größenänderung erhalten bleibt
    }
    
    function saveState() {
        history.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
    }

    function undo() {
        if (history.length > 0) {
            ctx.putImageData(history.pop(), 0, 0);
        }
    }
    
    function redrawFromHistory() {
        if (history.length > 0) {
            ctx.putImageData(history[history.length - 1], 0, 0);
        } else {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
    }

    function selectMode(newMode) {
        const currentMode = mode;
        mode = (currentMode === newMode) ? null : newMode;
        btnMirror.classList.toggle('active', mode === 'mirror');
        btnRotate.classList.toggle('active', mode === 'rotate');
    }

    btnMirror.addEventListener('click', () => selectMode('mirror'));
    btnRotate.addEventListener('click', () => selectMode('rotate'));
    btnClear.addEventListener('click', () => {
        history = [];
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    });
    btnUndo.addEventListener('click', undo);

    colorButtons.forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelector('.color-btn.active').classList.remove('active');
            btn.classList.add('active');
            currentStroke.color = btn.dataset.color;
        });
    });

    strokeSlider.addEventListener('input', (e) => {
        currentStroke.width = e.target.value;
    });

    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const touch = e.touches ? e.touches[0] : e;
        return {
            x: touch.clientX - rect.left,
            y: touch.clientY - rect.top
        };
    }

    function mirrorPoint(p) {
        return { x: canvas.clientWidth - p.x, y: p.y };
    }

    function rotatePoint180(p) {
        // Der Mittelpunkt ist die Mitte der sichtbaren Canvas-Fläche.
        // Das funktioniert für alle Displaygrößen, da clientWidth/clientHeight die tatsächliche Größe im Browser sind.
        return { x: canvas.clientWidth - p.x, y: canvas.clientHeight - p.y };
    }

    function drawSegment(a, b, strokeStyle) {
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.strokeStyle = strokeStyle.color;
        ctx.lineWidth = strokeStyle.width;
        ctx.stroke();
    }

    function onPointerDown(e) {
        e.preventDefault();
        saveState(); // Speichert den Zustand, bevor eine neue Linie gezeichnet wird
        drawing = true;
        prev = getPos(e);
    }

    function onPointerMove(e) {
        if (!drawing) return;
        e.preventDefault();
        const cur = getPos(e);
        drawSegment(prev, cur, currentStroke);

        if (mode === 'mirror') {
            drawSegment(mirrorPoint(prev), mirrorPoint(cur), currentStroke);
        } else if (mode === 'rotate') {
            drawSegment(rotatePoint180(prev), rotatePoint180(cur), currentStroke);
        }
        prev = cur;
    }

    function onPointerUp() {
        drawing = false;
        prev = null;
    }

    canvas.addEventListener('mousedown', onPointerDown);
    window.addEventListener('mousemove', onPointerMove);
    window.addEventListener('mouseup', onPointerUp);

    canvas.addEventListener('touchstart', onPointerDown, { passive: false });
    canvas.addEventListener('touchmove', onPointerMove, { passive: false });
    canvas.addEventListener('touchend', onPointerUp);

    window.addEventListener('resize', setupCanvas);
    setupCanvas();
</script>
