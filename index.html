<div id="controls-panel">
    <div class="control-group">
        <button id="mode-mirror">Achse</button>
        <button id="mode-rotate">Punkt</button>
    </div>
    <div class="separator"></div>
    <div class="control-group" id="color-picker">
        <button class="color-btn active" style="background-color: #000000;" data-color="#000000"></button>
        <button class="color-btn" style="background-color: #ef4444;" data-color="#ef4444"></button>
        <button class="color-btn" style="background-color: #3b82f6;" data-color="#3b82f6"></button>
        <button class="color-btn" style="background-color: #22c55e;" data-color="#22c55e"></button>
        <button class="color-btn" style="background-color: #eab308;" data-color="#eab308"></button>
    </div>
    <div class="separator"></div>
    <div class="control-group">
        <input type="range" id="stroke-width-slider" min="1" max="50" value="5">
    </div>
    <div class="separator"></div>
    <div class="control-group">
        <button id="undo" class="icon-btn" title="Zurück">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15 15l-6 6m0 0l-6-6m6 6V9a6 6 0 0112 0v3" /></svg>
        </button>
        <button id="clear" class="icon-btn" title="Löschen">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
        </button>
        <a href="#" id="download-btn" class="button-like icon-btn" title="Herunterladen">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
        </a>
    </div>
</div>

<div id="canvas-container">
    <canvas id="board"></canvas>
</div>

<script>
    const canvas = document.getElementById('board');
    const ctx = canvas.getContext('2d');
    
    // Feste hohe Auflösung
    canvas.width = 1920;
    canvas.height = 1080;

    const btnMirror = document.getElementById('mode-mirror');
    const btnRotate = document.getElementById('mode-rotate');
    const btnClear = document.getElementById('clear');
    const btnUndo = document.getElementById('undo');
    const colorPicker = document.getElementById('color-picker');
    const strokeSlider = document.getElementById('stroke-width-slider');
    const downloadBtn = document.getElementById('download-btn');

    let mode = null;
    let drawing = false;
    let history = [];
    let currentStroke = { color: '#000000', width: 5 };

    function saveState() {
        history.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
        if (history.length > 30) history.shift();
    }

    function redrawCanvas() {
        if (history.length > 0) {
            ctx.putImageData(history[history.length - 1], 0, 0);
        } else {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
        drawHelpers();
    }

    function drawHelpers() {
        if (mode === 'rotate') {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            ctx.beginPath();
            ctx.arc(centerX, centerY, 5, 0, 2 * Math.PI);
            ctx.fillStyle = 'rgba(150, 150, 150, 0.5)';
            ctx.fill();
        }
    }

    function selectMode(newMode) {
        mode = (mode === newMode) ? null : newMode;
        btnMirror.classList.toggle('active', mode === 'mirror');
        btnRotate.classList.toggle('active', mode === 'rotate');
        redrawCanvas();
    }

    btnMirror.addEventListener('click', () => selectMode('mirror'));
    btnRotate.addEventListener('click', () => selectMode('rotate'));
    
    btnClear.addEventListener('click', () => {
        history = [];
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        saveState();
        drawHelpers();
    });
    
    btnUndo.addEventListener('click', () => {
        if (history.length > 1) {
            history.pop();
            redrawCanvas();
        }
    });

    colorPicker.addEventListener('click', (e) => {
        const target = e.target.closest('.color-btn');
        if (target) {
            document.querySelector('.color-btn.active').classList.remove('active');
            target.classList.add('active');
            currentStroke.color = target.dataset.color;
        }
    });

    strokeSlider.addEventListener('input', (e) => {
        currentStroke.width = e.target.value;
    });

    downloadBtn.addEventListener('click', (e) => {
        e.preventDefault();
        downloadBtn.href = canvas.toDataURL('image/png');
        downloadBtn.download = 'symmetrie-kunstwerk.png';
        // Kurz warten, damit das href-Attribut gesetzt ist
        setTimeout(() => {
            downloadBtn.click();
        }, 0);
    });

    function getScaledPos(e) {
        const rect = canvas.getBoundingClientRect();
        const touch = e.touches ? e.touches[0] : e;
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        return {
            x: (touch.clientX - rect.left) * scaleX,
            y: (touch.clientY - rect.top) * scaleY
        };
    }

    function drawSegment(a, b, stroke) {
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.strokeStyle = stroke.color;
        ctx.lineWidth = stroke.width;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.stroke();
    }
    
    let lastPos = null;

    function onPointerDown(e) {
        e.preventDefault();
        saveState();
        drawing = true;
        lastPos = getScaledPos(e);
    }

    function onPointerMove(e) {
        if (!drawing) return;
        e.preventDefault();
        const currentPos = getScaledPos(e);
        
        const mirroredLast = mode === 'mirror' ? { x: canvas.width - lastPos.x, y: lastPos.y } : null;
        const mirroredCurrent = mode === 'mirror' ? { x: canvas.width - currentPos.x, y: currentPos.y } : null;
        
        const rotatedLast = mode === 'rotate' ? { x: canvas.width - lastPos.x, y: canvas.height - lastPos.y } : null;
        const rotatedCurrent = mode === 'rotate' ? { x: canvas.width - currentPos.x, y: canvas.height - currentPos.y } : null;

        drawSegment(lastPos, currentPos, currentStroke);
        if (mode === 'mirror') drawSegment(mirroredLast, mirroredCurrent, currentStroke);
        if (mode === 'rotate') drawSegment(rotatedLast, rotatedCurrent, currentStroke);
        
        lastPos = currentPos;
    }

    function onPointerUp() {
        drawing = false;
        lastPos = null;
    }

    canvas.addEventListener('mousedown', onPointerDown);
    window.addEventListener('mousemove', onPointerMove);
    window.addEventListener('mouseup', onPointerUp);
    canvas.addEventListener('touchstart', onPointerDown, { passive: false });
    canvas.addEventListener('touchmove', onPointerMove, { passive: false });
    canvas.addEventListener('touchend', onPointerUp);

    // Initiales Setup
    saveState();
</script>
