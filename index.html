<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Symmetrie-Zeichner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0f172a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        #canvas-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            padding: 10px;
            min-height: 0;
        }

        canvas {
            max-width: 100%;
            max-height: 100%;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            cursor: crosshair;
            touch-action: none;
        }

        #controls-panel {
            background: linear-gradient(to bottom, #1e293b, #0f172a);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 16px;
            display: flex;
            gap: 16px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            backdrop-filter: blur(10px);
        }

        .control-group {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        /* Modus-Buttons */
        #mode-mirror, #mode-rotate {
            padding: 10px 16px;
            border: 2px solid #64748b;
            background: transparent;
            color: #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #mode-mirror:hover, #mode-rotate:hover {
            border-color: #94a3b8;
            background: rgba(148, 163, 184, 0.1);
        }

        #mode-mirror.active, #mode-rotate.active {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border-color: #1d4ed8;
            color: white;
            box-shadow: 0 0 12px rgba(59, 130, 246, 0.5);
        }

        /* Farb-Buttons */
        #color-picker {
            display: flex;
            gap: 8px;
        }

        .color-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 3px solid transparent;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .color-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
        }

        .color-btn.active {
            border-color: white;
            box-shadow: 0 0 16px rgba(255, 255, 255, 0.5), inset 0 0 8px rgba(255, 255, 255, 0.3);
            transform: scale(1.15);
        }

        /* Stroke-Width Slider */
        #stroke-width-slider {
            width: 120px;
            height: 6px;
            border-radius: 3px;
            background: linear-gradient(to right, #64748b, #94a3b8);
            outline: none;
            -webkit-appearance: none;
            appearance: none;
            cursor: pointer;
        }

        #stroke-width-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            cursor: pointer;
            box-shadow: 0 0 8px rgba(59, 130, 246, 0.6);
            transition: all 0.2s ease;
        }

        #stroke-width-slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            box-shadow: 0 0 12px rgba(59, 130, 246, 0.8);
        }

        #stroke-width-slider::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border: none;
            cursor: pointer;
            box-shadow: 0 0 8px rgba(59, 130, 246, 0.6);
            transition: all 0.2s ease;
        }

        /* Icon Buttons */
        .icon-btn {
            width: 40px;
            height: 40px;
            padding: 8px;
            border: 2px solid #64748b;
            background: transparent;
            color: #e2e8f0;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .icon-btn:hover {
            border-color: #94a3b8;
            background: rgba(148, 163, 184, 0.1);
            color: #f1f5f9;
        }

        .icon-btn:active {
            transform: scale(0.95);
        }

        .icon-btn svg {
            width: 20px;
            height: 20px;
            stroke-width: 2;
        }

        #undo:hover {
            border-color: #fbbf24;
            background: rgba(251, 191, 36, 0.1);
            color: #fcd34d;
        }

        #clear:hover {
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
            color: #fca5a5;
        }

        #download-btn {
            border-color: #10b981 !important;
            color: #86efac !important;
        }

        #download-btn:hover {
            background: rgba(16, 185, 129, 0.1) !important;
            color: #6ee7b7 !important;
        }

        /* Separator */
        .separator {
            width: 1px;
            height: 24px;
            background: rgba(255, 255, 255, 0.1);
        }

        /* Responsive */
        @media (max-width: 768px) {
            #controls-panel {
                padding: 10px 12px;
                gap: 12px;
            }

            .control-group {
                gap: 6px;
            }

            #stroke-width-slider {
                width: 80px;
            }
        }
    </style>
</head>
<body>
    <div id="canvas-container">
        <canvas id="board"></canvas>
    </div>

    <div id="controls-panel">
        <div class="control-group">
            <button id="mode-mirror">Achse</button>
            <button id="mode-rotate">Punkt</button>
        </div>

        <div class="separator"></div>

        <div class="control-group" id="color-picker">
            <button class="color-btn active" style="background-color: #000000;" data-color="#000000" title="Schwarz"></button>
            <button class="color-btn" style="background-color: #ef4444;" data-color="#ef4444" title="Rot"></button>
            <button class="color-btn" style="background-color: #3b82f6;" data-color="#3b82f6" title="Blau"></button>
            <button class="color-btn" style="background-color: #10b981;" data-color="#10b981" title="Grün"></button>
            <button class="color-btn" style="background-color: #f59e0b;" data-color="#f59e0b" title="Orange"></button>
            <button class="color-btn" style="background-color: #8b5cf6;" data-color="#8b5cf6" title="Lila"></button>
        </div>

        <div class="separator"></div>

        <div class="control-group">
            <input type="range" id="stroke-width-slider" min="1" max="50" value="5" title="Stiftdicke">
        </div>

        <div class="separator"></div>

        <div class="control-group">
            <button id="undo" class="icon-btn" title="Zurück (⌘Z)">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 15L3 9m0 0l6-6m-6 6h12a6 6 0 010 12h-3"/>
                </svg>
            </button>
            <button id="clear" class="icon-btn" title="Löschen">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                </svg>
            </button>
            <button id="download-btn" class="icon-btn" title="Speichern">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                </svg>
            </button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('board');
        const ctx = canvas.getContext('2d');
        
        let canvasDisplayWidth = 0;
        let canvasDisplayHeight = 0;
        let dpr = window.devicePixelRatio || 1;

        // Responsive Canvas-Größe
        function resizeCanvas() {
            const container = document.getElementById('canvas-container');
            dpr = window.devicePixelRatio || 1;
            
            // Aspect Ratio 16:9 für bessere Zeichenfläche
            const maxWidth = container.clientWidth - 20;
            const maxHeight = container.clientHeight - 20;
            
            let width = maxWidth;
            let height = width * 9 / 16;
            
            if (height > maxHeight) {
                height = maxHeight;
                width = height * 16 / 9;
            }
            
            canvasDisplayWidth = width;
            canvasDisplayHeight = height;
            
            canvas.style.width = width + 'px';
            canvas.style.height = height + 'px';
            
            // Interne Auflösung für bessere Qualität
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            ctx.scale(dpr, dpr);
            
            redrawCanvas();
        }

        const btnMirror = document.getElementById('mode-mirror');
        const btnRotate = document.getElementById('mode-rotate');
        const btnClear = document.getElementById('clear');
        const btnUndo = document.getElementById('undo');
        const colorPicker = document.getElementById('color-picker');
        const strokeSlider = document.getElementById('stroke-width-slider');
        const downloadBtn = document.getElementById('download-btn');

        let mode = null;
        let drawing = false;
        let history = [];
        let currentStroke = { color: '#000000', width: 5 };

        function saveState() {
            history.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
            if (history.length > 50) history.shift();
        }

        function redrawCanvas() {
            if (history.length > 0) {
                ctx.putImageData(history[history.length - 1], 0, 0);
            } else {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
            drawHelpers();
        }

        function drawHelpers() {
            if (mode === 'mirror') {
                const centerX = canvasDisplayWidth / 2;
                ctx.strokeStyle = 'rgba(59, 130, 246, 0.2)';
                ctx.lineWidth = 2;
                ctx.setLineDash([8, 8]);
                ctx.beginPath();
                ctx.moveTo(centerX, 0);
                ctx.lineTo(centerX, canvasDisplayHeight);
                ctx.stroke();
                ctx.setLineDash([]);
            } else if (mode === 'rotate') {
                const centerX = canvasDisplayWidth / 2;
                const centerY = canvasDisplayHeight / 2;
                ctx.fillStyle = 'rgba(59, 130, 246, 0.3)';
                ctx.beginPath();
                ctx.arc(centerX, centerY, 8, 0, 2 * Math.PI);
                ctx.fill();
            }
        }

        function selectMode(newMode) {
            mode = (mode === newMode) ? null : newMode;
            btnMirror.classList.toggle('active', mode === 'mirror');
            btnRotate.classList.toggle('active', mode === 'rotate');
            redrawCanvas();
        }

        btnMirror.addEventListener('click', () => selectMode('mirror'));
        btnRotate.addEventListener('click', () => selectMode('rotate'));
        
        btnClear.addEventListener('click', () => {
            if (confirm('Sicher, dass du alles löschen möchtest?')) {
                history = [];
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                saveState();
                drawHelpers();
            }
        });
        
        btnUndo.addEventListener('click', () => {
            if (history.length > 1) {
                history.pop();
                redrawCanvas();
            }
        });

        // Tastaturkürzel
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
                e.preventDefault();
                btnUndo.click();
            }
        });

        colorPicker.addEventListener('click', (e) => {
            const target = e.target.closest('.color-btn');
            if (target) {
                document.querySelector('.color-btn.active').classList.remove('active');
                target.classList.add('active');
                currentStroke.color = target.dataset.color;
            }
        });

        strokeSlider.addEventListener('input', (e) => {
            currentStroke.width = e.target.value;
        });

        downloadBtn.addEventListener('click', (e) => {
            e.preventDefault();
            canvas.toBlob((blob) => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `symmetrie-${new Date().getTime()}.png`;
                a.click();
                URL.revokeObjectURL(url);
            }, 'image/png');
        });

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches ? e.touches[0] : e;
            return {
                x: touch.clientX - rect.left,
                y: touch.clientY - rect.top
            };
        }

        function drawSegment(a, b, stroke) {
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.strokeStyle = stroke.color;
            ctx.lineWidth = stroke.width;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.stroke();
        }
        
        let lastPos = null;

        function onPointerDown(e) {
            e.preventDefault();
            saveState();
            drawing = true;
            lastPos = getPos(e);
        }

        function onPointerMove(e) {
            if (!drawing) return;
            e.preventDefault();
            const currentPos = getPos(e);
            
            const mirroredLast = mode === 'mirror' ? { x: canvasDisplayWidth - lastPos.x, y: lastPos.y } : null;
            const mirroredCurrent = mode === 'mirror' ? { x: canvasDisplayWidth - currentPos.x, y: currentPos.y } : null;
            
            const rotatedLast = mode === 'rotate' ? { x: canvasDisplayWidth - lastPos.x, y: canvasDisplayHeight - lastPos.y } : null;
            const rotatedCurrent = mode === 'rotate' ? { x: canvasDisplayWidth - currentPos.x, y: canvasDisplayHeight - currentPos.y } : null;

            drawSegment(lastPos, currentPos, currentStroke);
            if (mode === 'mirror') drawSegment(mirroredLast, mirroredCurrent, currentStroke);
            if (mode === 'rotate') drawSegment(rotatedLast, rotatedCurrent, currentStroke);
            
            lastPos = currentPos;
        }

        function onPointerUp() {
            drawing = false;
            lastPos = null;
        }

        canvas.addEventListener('mousedown', onPointerDown);
        window.addEventListener('mousemove', onPointerMove);
        window.addEventListener('mouseup', onPointerUp);
        canvas.addEventListener('touchstart', onPointerDown, { passive: false });
        canvas.addEventListener('touchmove', onPointerMove, { passive: false });
        canvas.addEventListener('touchend', onPointerUp);

        // Resize-Handling
        window.addEventListener('resize', resizeCanvas);

        // Initiales Setup
        resizeCanvas();
        saveState();
    </script>
</body>
</html>
